services:

  # ─────────────────────────────────────────
  # KAFKA — KRaft mode (sem Zookeeper)
  # ─────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg=="
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "24"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    networks:
      - pw-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 --topic pvp_kills --partitions 1 --replication-factor 1 &&
        echo 'Topico criado: pvp_kills'
    networks:
      - pw-net
    restart: "no"

  # ─────────────────────────────────────────
  # POSTGRESQL  (serving layer → Grafana)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: tabacaria
      POSTGRES_PASSWORD: tabacaria123
      POSTGRES_DB: tabacaria_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pw-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabacaria -d tabacaria_dw"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ─────────────────────────────────────────
  # DISCORD PRODUCER  (Discord API → Kafka pvp_kills)
  # ─────────────────────────────────────────
  discord-producer:
    build: ./discord_producer
    container_name: discord-producer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID:-1035423433040875590}
      START_ID: ${START_ID:-1479225035926540351}
      STOP_ID: ${STOP_ID:-0}
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: pvp_kills
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: tabacaria_dw
      PG_USER: tabacaria
      PG_PASS: tabacaria123
    networks:
      - pw-net
    restart: on-failure

  # ─────────────────────────────────────────
  # PVP CONSUMER  (Kafka pvp_kills → PostgreSQL)
  # ─────────────────────────────────────────
  pvp-consumer:
    build: ./pvp_consumer
    container_name: pvp-consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: pvp_kills
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: tabacaria_dw
      PG_USER: tabacaria
      PG_PASS: tabacaria123
    networks:
      - pw-net
    restart: on-failure

  # ─────────────────────────────────────────
  # PVP CONTROL  (Web UI — config, timelapse, reset)
  # ─────────────────────────────────────────
  pvp-control:
    build: ./pvp_control
    container_name: pvp-control
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: tabacaria_dw
      PG_USER: tabacaria
      PG_PASS: tabacaria123
    networks:
      - pw-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # KAFKA EXPORTER  (métricas Kafka → Prometheus)
  # ─────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - "--kafka.server=kafka:9092"
      - "--verbosity=0"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pw-net
    restart: on-failure

  # ─────────────────────────────────────────
  # PROMETHEUS  (coleta de métricas)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - pw-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # GRAFANA  (dashboard)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/pvp.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - pw-net

volumes:
  kafka-data:
  postgres-data:
  grafana-data:
  prometheus-data:

networks:
  pw-net:
    driver: bridge
