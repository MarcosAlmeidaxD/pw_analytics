global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Métricas do Kafka (lag, throughput, partições, brokers)
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # Métricas do Spark (executors, tasks, memory, streaming)
  - job_name: spark_executors
    static_configs:
      - targets: ["spark:4040"]
    metrics_path: /metrics/executors/prometheus/
    scrape_interval: 30s

  # spark_streaming: endpoint não disponível no Spark 3.5 via Prometheus nativo.
  # Alternativa: usar as métricas do streaming via spark_executors acima.
